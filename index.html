<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riham Lovable Animation</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #3a1d45 0%, #1a1029 38%, #090611 100%);
      font-family: Arial, Helvetica, sans-serif;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .badge {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.2em;
      font-size: 12px;
      backdrop-filter: blur(12px);
      pointer-events: none;
      box-shadow: 0 0 30px rgba(255, 120, 210, 0.18);
    }
    .note {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 18px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      backdrop-filter: blur(10px);
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="badge">LOVABLE DREAM • RIHAM</div>
  <div class="note">soft hearts • sparkles • floating glow</div>

  <!-- Manual checks:
    1. Page loads without module/import errors.
    2. "riham" appears centered in pink glowing 3D text.
    3. Small hearts float around the name.
    4. Sparkles shimmer in the background.
    5. Drag rotates the view and resize still fills the screen.
  -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/FontLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/geometries/TextGeometry.js"></script>

  <script>
    const canvas = document.getElementById('scene');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2('#160c20', 0.025);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 9);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 5;
    controls.maxDistance = 14;
    controls.maxPolarAngle = Math.PI * 0.65;
    controls.minPolarAngle = Math.PI * 0.3;

    const ambient = new THREE.AmbientLight('#ffd7f8', 1.25);
    scene.add(ambient);

    const pinkLight = new THREE.PointLight('#ff7ccf', 1.9, 30);
    pinkLight.position.set(4, 4, 5);
    scene.add(pinkLight);

    const violetLight = new THREE.PointLight('#b68cff', 1.6, 30);
    violetLight.position.set(-4, -1, 4);
    scene.add(violetLight);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(8, 64),
      new THREE.MeshBasicMaterial({ color: '#24142f', transparent: true, opacity: 0.5, side: THREE.DoubleSide })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -2.5;
    scene.add(floor);

    const starsCount = 1200;
    const starGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount; i++) {
      const i3 = i * 3;
      const radius = 10 + Math.random() * 20;
      const theta = Math.random() * Math.PI * 2;
      const y = (Math.random() - 0.5) * 10;
      starPositions[i3] = Math.cos(theta) * radius;
      starPositions[i3 + 1] = y;
      starPositions[i3 + 2] = Math.sin(theta) * radius;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({
        color: '#ffe8fb',
        size: 0.07,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    scene.add(stars);

    function createHeartShape(scale) {
      const x = 0, y = 0;
      const shape = new THREE.Shape();
      shape.moveTo(x, y + 0.25 * scale);
      shape.bezierCurveTo(x, y + 0.25 * scale, x - 0.22 * scale, y, x - 0.5 * scale, y);
      shape.bezierCurveTo(x - 0.95 * scale, y, x - 0.95 * scale, y + 0.6 * scale, x - 0.95 * scale, y + 0.6 * scale);
      shape.bezierCurveTo(x - 0.95 * scale, y + 1.0 * scale, x - 0.55 * scale, y + 1.25 * scale, x, y + 1.55 * scale);
      shape.bezierCurveTo(x + 0.55 * scale, y + 1.25 * scale, x + 0.95 * scale, y + 1.0 * scale, x + 0.95 * scale, y + 0.6 * scale);
      shape.bezierCurveTo(x + 0.95 * scale, y + 0.6 * scale, x + 0.95 * scale, y, x + 0.5 * scale, y);
      shape.bezierCurveTo(x + 0.22 * scale, y, x, y + 0.25 * scale, x, y + 0.25 * scale);
      return shape;
    }

    function createHeart(color, scale) {
      const geometry = new THREE.ExtrudeGeometry(createHeartShape(scale), {
        depth: 0.08 * scale,
        bevelEnabled: true,
        bevelSegments: 2,
        steps: 1,
        bevelSize: 0.03 * scale,
        bevelThickness: 0.03 * scale
      });
      geometry.center();
      const material = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.35,
        roughness: 0.25,
        metalness: 0.1
      });
      return new THREE.Mesh(geometry, material);
    }

    const heartsGroup = new THREE.Group();
    scene.add(heartsGroup);
    const hearts = [];
    const heartColors = ['#ff8fd1', '#ffb3df', '#ffc8ef', '#f3a8ff', '#ffd6f4'];

    for (let i = 0; i < 10; i++) {
      const heart = createHeart(heartColors[i % heartColors.length], 0.22 + Math.random() * 0.08);
      heart.userData = {
        offset: i * 0.55,
        radius: 2.6 + Math.random() * 1.4,
        speed: 0.5 + Math.random() * 0.4,
        lift: 0.4 + Math.random() * 0.8
      };
      hearts.push(heart);
      heartsGroup.add(heart);
    }

    const sparkleCount = 180;
    const sparkleGeo = new THREE.BufferGeometry();
    const sparklePositions = new Float32Array(sparkleCount * 3);
    const sparkleMeta = [];
    for (let i = 0; i < sparkleCount; i++) {
      const i3 = i * 3;
      sparklePositions[i3] = (Math.random() - 0.5) * 8;
      sparklePositions[i3 + 1] = (Math.random() - 0.5) * 5;
      sparklePositions[i3 + 2] = (Math.random() - 0.5) * 4;
      sparkleMeta.push({
        x: sparklePositions[i3],
        y: sparklePositions[i3 + 1],
        z: sparklePositions[i3 + 2],
        phase: Math.random() * Math.PI * 2,
        speed: 0.8 + Math.random() * 1.2
      });
    }
    sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));
    const sparkles = new THREE.Points(
      sparkleGeo,
      new THREE.PointsMaterial({
        color: '#ffffff',
        size: 0.05,
        transparent: true,
        opacity: 0.95,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    scene.add(sparkles);

    const loader = new THREE.FontLoader();
    let textMesh = null;
    let glowMesh = null;

    loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {
      const geometry = new THREE.TextGeometry('riham', {
        font: font,
        size: 1.55,
        height: 0.42,
        curveSegments: 18,
        bevelEnabled: true,
        bevelThickness: 0.04,
        bevelSize: 0.03,
        bevelSegments: 8
      });
      geometry.center();

      const material = new THREE.MeshPhysicalMaterial({
        color: '#ffd5ef',
        emissive: '#ff77cc',
        emissiveIntensity: 0.55,
        roughness: 0.16,
        metalness: 0.18,
        clearcoat: 1,
        clearcoatRoughness: 0.15
      });
      textMesh = new THREE.Mesh(geometry, material);
      textMesh.position.y = 0.1;
      scene.add(textMesh);

      const glowGeometry = geometry.clone();
      const glowMaterial = new THREE.MeshBasicMaterial({
        color: '#ffb3e7',
        transparent: true,
        opacity: 0.22,
        side: THREE.BackSide
      });
      glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
      glowMesh.position.copy(textMesh.position);
      glowMesh.scale.setScalar(1.08);
      scene.add(glowMesh);
    }, undefined, function(error) {
      console.error('Font failed to load:', error);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      controls.update();
      stars.rotation.y = t * 0.02;

      pinkLight.position.x = Math.sin(t * 0.9) * 5;
      pinkLight.position.y = 3 + Math.cos(t * 1.1) * 1.2;
      violetLight.position.x = Math.cos(t * 0.7) * 5;
      violetLight.position.z = 4 + Math.sin(t * 1.0) * 1.5;

      hearts.forEach((heart, i) => {
        const tt = t * heart.userData.speed + heart.userData.offset;
        heart.position.x = Math.cos(tt) * heart.userData.radius;
        heart.position.y = Math.sin(tt * 1.8) * heart.userData.lift + 0.4;
        heart.position.z = Math.sin(tt) * 1.6;
        heart.rotation.y = tt;
        heart.rotation.x = Math.sin(tt * 2) * 0.25;
      });

      const positions = sparkles.geometry.attributes.position.array;
      for (let i = 0; i < sparkleCount; i++) {
        const i3 = i * 3;
        const p = sparkleMeta[i];
        positions[i3] = p.x + Math.sin(t * p.speed + p.phase) * 0.08;
        positions[i3 + 1] = p.y + Math.cos(t * p.speed * 1.2 + p.phase) * 0.08;
        positions[i3 + 2] = p.z + Math.sin(t * p.speed * 0.8 + p.phase) * 0.08;
      }
      sparkles.geometry.attributes.position.needsUpdate = true;

      if (textMesh && glowMesh) {
        textMesh.rotation.y = Math.sin(t * 0.6) * 0.22;
        textMesh.rotation.x = Math.cos(t * 0.4) * 0.06;
        textMesh.position.y = 0.1 + Math.sin(t * 1.5) * 0.16;

        glowMesh.rotation.copy(textMesh.rotation);
        glowMesh.position.copy(textMesh.position);
        glowMesh.scale.setScalar(1.08 + Math.sin(t * 2.4) * 0.03);
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
