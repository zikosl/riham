<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riham Fairy Dreamscape</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #14213d 0%, #090b16 35%, #020308 100%);
    }
    canvas { display: block; }
  </style>
</head>
<body>

<canvas id="scene"></canvas>

<!-- FIX: use non-module CDN (no import needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/geometries/TextGeometry.js"></script>

<script>

const canvas = document.getElementById('scene');

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2('#120818', 0.03);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 10);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const light = new THREE.PointLight('#ff7adf', 2);
light.position.set(5,5,5);
scene.add(light);

const loader = new THREE.FontLoader();

let textMesh;

loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {

  const geometry = new THREE.TextGeometry('riham', {
    font: font,
    size: 1.5,
    height: 0.4
  });

  const material = new THREE.MeshStandardMaterial({ color: '#ff9ce8' });

  textMesh = new THREE.Mesh(geometry, material);
  geometry.center();
  scene.add(textMesh);

});

function animate() {
  requestAnimationFrame(animate);

  if(textMesh){
    textMesh.rotation.y += 0.01;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
