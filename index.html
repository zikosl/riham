<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riham Dreamscape</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #14213d 0%, #090b16 35%, #020308 100%);
    }
    #scene {
      position: fixed;
      inset: 0;
    }
    .top-badge {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.35em;
      font-size: 12px;
      backdrop-filter: blur(12px);
      z-index: 5;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .bottom-note {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.22);
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      backdrop-filter: blur(12px);
      z-index: 5;
      text-align: center;
    }
    .glow-top,
    .glow-bottom {
      position: fixed;
      left: 0;
      right: 0;
      pointer-events: none;
      filter: blur(60px);
      z-index: 1;
    }
    .glow-top {
      top: 0;
      height: 180px;
      background: linear-gradient(to bottom, rgba(255, 70, 220, 0.18), transparent);
    }
    .glow-bottom {
      bottom: 0;
      height: 220px;
      background: linear-gradient(to top, rgba(70, 220, 255, 0.18), transparent);
    }
    @media (max-width: 640px) {
      .top-badge {
        letter-spacing: 0.22em;
        font-size: 10px;
        padding: 8px 14px;
        top: 18px;
      }
      .bottom-note {
        width: calc(100% - 28px);
        font-size: 13px;
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>
  <div class="top-badge">DREAMSCAPE • RIHAM</div>
  <div class="bottom-note">Drag to orbit • Scroll to zoom</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { FontLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/FontLoader.js';
    import { TextGeometry } from 'https://unpkg.com/three@0.160.0/examples/jsm/geometries/TextGeometry.js';

    const canvas = document.getElementById('scene');

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2('#050816', 0.035);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 10);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 6;
    controls.maxDistance = 16;
    controls.maxPolarAngle = Math.PI * 0.62;
    controls.minPolarAngle = Math.PI * 0.35;

    const mainGroup = new THREE.Group();
    scene.add(mainGroup);

    const ambient = new THREE.AmbientLight('#88aaff', 1.35);
    scene.add(ambient);

    const pinkLight = new THREE.PointLight('#ff4fd8', 30, 30, 2);
    pinkLight.position.set(-4, 3, 6);
    scene.add(pinkLight);

    const cyanLight = new THREE.PointLight('#4deaff', 28, 32, 2);
    cyanLight.position.set(5, -1, 5);
    scene.add(cyanLight);

    const rimLight = new THREE.DirectionalLight('#ffffff', 2.6);
    rimLight.position.set(0, 5, -2);
    scene.add(rimLight);

    const floorGeo = new THREE.CircleGeometry(8, 64);
    const floorMat = new THREE.MeshBasicMaterial({
      color: '#091426',
      transparent: true,
      opacity: 0.5,
      side: THREE.DoubleSide,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -2.5;
    scene.add(floor);

    const ringGroup = new THREE.Group();
    scene.add(ringGroup);

    function createRing(radius, tube, color, y, speed) {
      const geo = new THREE.TorusGeometry(radius, tube, 24, 120);
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: color,
        emissiveIntensity: 1.3,
        metalness: 0.55,
        roughness: 0.2,
        transparent: true,
        opacity: 0.75,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = Math.PI / 2.25;
      mesh.position.y = y;
      mesh.userData.speed = speed;
      ringGroup.add(mesh);
      return mesh;
    }

    const rings = [
      createRing(2.7, 0.035, '#46d5ff', -0.05, 0.35),
      createRing(3.25, 0.025, '#ff61d8', 0.18, -0.28),
      createRing(3.9, 0.02, '#8d7bff', -0.2, 0.18),
    ];

    const starsCount = 1800;
    const starGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount; i++) {
      const i3 = i * 3;
      const radius = 12 + Math.random() * 28;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      starPositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
      starPositions[i3 + 1] = radius * Math.cos(phi) * 0.6;
      starPositions[i3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

    const starMat = new THREE.PointsMaterial({
      color: '#d7ecff',
      size: 0.08,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    const sparkleCount = 220;
    const sparkleGeo = new THREE.BufferGeometry();
    const sparklePositions = new Float32Array(sparkleCount * 3);
    const sparkleOffsets = [];

    for (let i = 0; i < sparkleCount; i++) {
      const i3 = i * 3;
      const angle = Math.random() * Math.PI * 2;
      const radius = 2.6 + Math.random() * 2.4;
      sparklePositions[i3] = Math.cos(angle) * radius;
      sparklePositions[i3 + 1] = -0.5 + Math.random() * 2.2;
      sparklePositions[i3 + 2] = Math.sin(angle) * radius * 0.4;
      sparkleOffsets.push({
        angle,
        radius,
        speed: 0.3 + Math.random() * 0.8,
        rise: Math.random() * Math.PI * 2,
      });
    }

    sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));
    const sparkleMat = new THREE.PointsMaterial({
      color: '#ffffff',
      size: 0.05,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
    mainGroup.add(sparkles);

    let textMesh = null;
    let glowMesh = null;

    const loader = new FontLoader();
    loader.load(
      'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',
      (font) => {
        const textGeo = new TextGeometry('riham', {
          font,
          size: 1.55,
          depth: 0.42,
          curveSegments: 18,
          bevelEnabled: true,
          bevelThickness: 0.06,
          bevelSize: 0.05,
          bevelOffset: 0,
          bevelSegments: 10,
        });

        textGeo.center();

        const textMat = new THREE.MeshPhysicalMaterial({
          color: '#ffd4f4',
          emissive: '#a238ff',
          emissiveIntensity: 0.9,
          metalness: 0.55,
          roughness: 0.14,
          clearcoat: 1,
          clearcoatRoughness: 0.18,
          transmission: 0.08,
          ior: 1.35,
        });

        textMesh = new THREE.Mesh(textGeo, textMat);
        textMesh.position.y = 0.2;
        mainGroup.add(textMesh);

        const glowGeo = textGeo.clone();
        const glowMat = new THREE.MeshBasicMaterial({
          color: '#ff6ae6',
          transparent: true,
          opacity: 0.22,
          side: THREE.BackSide,
        });

        glowMesh = new THREE.Mesh(glowGeo, glowMat);
        glowMesh.position.copy(textMesh.position);
        glowMesh.scale.setScalar(1.08);
        mainGroup.add(glowMesh);
      }
    );

    const clock = new THREE.Clock();

    function animate() {
      const t = clock.getElapsedTime();
      controls.update();

      stars.rotation.y = t * 0.03;
      stars.rotation.x = Math.sin(t * 0.1) * 0.05;

      ringGroup.rotation.y = t * 0.22;
      ringGroup.rotation.x = Math.sin(t * 0.6) * 0.08;

      rings.forEach((ring, i) => {
        ring.rotation.z += 0.002 + i * 0.0008;
        ring.position.y += Math.sin(t * 1.2 + i) * 0.0009;
      });

      const positions = sparkles.geometry.attributes.position.array;
      for (let i = 0; i < sparkleCount; i++) {
        const i3 = i * 3;
        const p = sparkleOffsets[i];
        positions[i3] = Math.cos(t * p.speed + p.angle) * p.radius;
        positions[i3 + 1] = Math.sin(t * 1.5 + p.rise) * 0.9;
        positions[i3 + 2] = Math.sin(t * p.speed + p.angle) * p.radius * 0.35;
      }
      sparkles.geometry.attributes.position.needsUpdate = true;

      if (textMesh && glowMesh) {
        textMesh.rotation.y = Math.sin(t * 0.65) * 0.28;
        textMesh.rotation.x = Math.cos(t * 0.4) * 0.08;
        textMesh.position.y = 0.2 + Math.sin(t * 1.4) * 0.18;

        glowMesh.rotation.copy(textMesh.rotation);
        glowMesh.position.copy(textMesh.position);
        const pulse = 1.08 + Math.sin(t * 2.5) * 0.035;
        glowMesh.scale.setScalar(pulse);
      }

      pinkLight.position.x = Math.sin(t * 1.2) * 5;
      pinkLight.position.y = 2.2 + Math.cos(t * 0.8) * 1.2;
      cyanLight.position.x = Math.cos(t * 0.95) * 5;
      cyanLight.position.z = 5 + Math.sin(t * 1.3) * 1.5;

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
